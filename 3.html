<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TXT Consolidator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:520px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:16px;
    padding:20px;
    color:white;
}

h2{
    text-align:center;
    font-size:20px;
    margin-bottom:15px;
}

label{
    font-size:12px;
    font-weight:500;
    margin-bottom:5px;
    display:block;
    color:#cbd5e1;
}

.field{
    margin-bottom:12px;
}

.row{
    display:flex;
    gap:8px;
}

input{
    flex:1;
    padding:8px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:12px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:8px;
    font-size:12px;
    padding:8px 10px;
    color:white;
}

.browse{background:#3b82f6;}
.green{background:#22c55e;}
.orange{background:#f59e0b;}
.red{background:#ef4444;}

textarea{
    width:100%;
    height:120px;
    border-radius:10px;
    border:none;
    padding:8px;
    font-size:11px;
    resize:none;
    outline:none;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-size:11px;
    color:#cbd5e1;
}

.smallBox{
    text-align:center;
    flex:1;
}

.smallBox b{
    display:block;
    font-size:14px;
    color:white;
}

.buttons{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.buttons button{
    flex:1;
    padding:8px;
    font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h2>TXT CONSOLIDATOR</h2>

<!-- Folder -->
<div class="field">

<label>Script Folder</label>

<div class="row">

<input type="text" id="folderName" readonly placeholder="Select folder">

<button class="browse"
onclick="document.getElementById('folderPicker').click()">
Browse
</button>

</div>

<input type="file" id="folderPicker" webkitdirectory multiple hidden>

</div>

<!-- Output -->
<div class="field">

<label>Consolidated script File Name</label>

<input type="text" id="outputFile" placeholder="merged.txt">

</div>

<!-- Stats -->
<div class="stats">

<div class="smallBox">
<b id="totalFiles">0</b>
Total
</div>

<div class="smallBox">
<b id="txtFiles">0</b>
TXT
</div>

<div class="smallBox">
<b id="status">Idle</b>
Status
</div>

</div>

<!-- Log -->
<textarea id="logArea" readonly></textarea>

<!-- Buttons -->
<div class="buttons">

<button class="green" onclick="consolidateFiles()">Consolidate</button>
<button class="orange" onclick="clearFields()">Clear</button>
<button class="red" onclick="goBack()">Back</button>

</div>

</div>

<script>

let files = [];

document.getElementById("folderPicker")
.addEventListener("change",(e)=>{

files = [...e.target.files];

let folder = files[0].webkitRelativePath.split("/")[0];

document.getElementById("folderName").value = folder;

let txtCount = files.filter(f=>f.name.endsWith(".txt")).length;

document.getElementById("totalFiles").innerText = files.length;
document.getElementById("txtFiles").innerText = txtCount;
document.getElementById("status").innerText = "Ready";

document.getElementById("logArea").value =
"Folder Loaded: " + folder + "\nTXT Files: " + txtCount;

});

async function consolidateFiles(){

let output = document.getElementById("outputFile").value.trim();
let log = document.getElementById("logArea");

if(files.length === 0) return alert("Select folder");
if(output === "") return alert("Enter output file name");

document.getElementById("status").innerText = "Processing";

let merged = "";

for(let f of files){

if(f.name.toLowerCase().endsWith(".txt")){

let content = await f.text();

// ❌ NO FILE NAME INCLUDED (as requested)
merged += content + "\n\n";

log.value += "\nReading: " + f.webkitRelativePath;

}

}

let blob = new Blob([merged],{type:"text/plain"});
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = output.endsWith(".txt") ? output : output + ".txt";

a.click();

document.getElementById("status").innerText = "Done";

log.value += "\n\nMerge Completed Successfully";

}

function clearFields(){

files = [];

document.getElementById("folderName").value = "";
document.getElementById("outputFile").value = "";
document.getElementById("logArea").value = "";

document.getElementById("totalFiles").innerText = "0";
document.getElementById("txtFiles").innerText = "0";
document.getElementById("status").innerText = "Idle";

}

function goBack(){
history.back();
}

</script>

</body>
</html>
