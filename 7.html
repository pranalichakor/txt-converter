<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro File Consolidator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:600px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:20px;
    color:white;
    position:relative;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

/* Loader */
.loader {
    border: 4px solid #1e293b;
    border-top: 4px solid #22c55e;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin:10px auto;
    display:none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

label{
    font-size:12px;
    color:#cbd5e1;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.row{
    display:flex;
    gap:8px;
}

.browse{background:#3b82f6;}
.green{background:#22c55e;}
.orange{background:#f59e0b;}
.purple{background:#8b5cf6;}

textarea{
    width:100%;
    height:120px;
    margin-top:10px;
    border-radius:10px;
    padding:10px;
    font-size:11px;
    border:none;
}

.stats{
    display:flex;
    gap:10px;
    margin:10px 0;
}

.box{
    flex:1;
    background:rgba(255,255,255,0.05);
    padding:10px;
    text-align:center;
    border-radius:10px;
}

.actions{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.actions button{
    flex:1;
}

#resultButtons{
    display:none;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>PRO FILE CONSOLIDATOR</h2>

<!-- Folder -->
<div>
<label>Folder</label>
<div class="row">
<input type="text" id="folderName" readonly>
<button class="browse" onclick="document.getElementById('folderPicker').click()">Browse</button>
</div>
<input type="file" id="folderPicker" webkitdirectory multiple hidden>
</div>

<!-- Output -->
<div>
<label>Output Name</label>
<input type="text" id="outputFile" placeholder="merged">
</div>

<!-- File Type -->
<div>
<label>File Type</label>
<select id="fileType">
<option value="all">ALL</option>
<option value=".txt">TXT</option>
<option value=".log">LOG</option>
<option value=".csv">CSV</option>
<option value=".json">JSON</option>
<option value=".html">HTML</option>
<option value=".js">JS</option>
<option value=".py">PY</option>
<option value=".md">MD</option>
</select>
</div>

<!-- Stats -->
<div class="stats">
<div class="box"><b id="total">0</b>Total</div>
<div class="box"><b id="matched">0</b>Matched</div>
<div class="box"><b id="status">Idle</b>Status</div>
</div>

<!-- Loader -->
<div class="loader" id="loader"></div>

<!-- Buttons -->
<div class="actions">

<button class="green" onclick="startMerge()">Consolidate</button>
<button class="orange" onclick="clearAll()">Clear</button>

</div>

<!-- RESULT BUTTONS -->
<div id="resultButtons">

<button class="green" onclick="downloadFile()">Download</button>
<button class="purple" onclick="viewFile()">View</button>

</div>

<textarea id="log" readonly></textarea>

</div>

<script>

let files = [];
let mergedContent = "";

document.getElementById("folderPicker").addEventListener("change",(e)=>{

files = [...e.target.files];

if(files.length===0) return;

document.getElementById("folderName").value =
files[0].webkitRelativePath.split("/")[0];

document.getElementById("total").innerText = files.length;
document.getElementById("status").innerText = "Ready";

});

/* START MERGE */
async function startMerge(){

if(files.length===0){
alert("Select folder");
return;
}

let type = document.getElementById("fileType").value;
let name = document.getElementById("outputFile").value || "merged";

mergedContent = "";

document.getElementById("loader").style.display="block";
document.getElementById("status").innerText="Processing";

document.getElementById("log").value=""; // CLEAN LOG

let count = 0;

for(let f of files){

let ext = "." + f.name.split(".").pop().toLowerCase();

if(type==="all" || ext===type){

try{

let text = await f.text();
mergedContent += text + "\n\n";
count++;

}
catch(e){}

}

}

document.getElementById("loader").style.display="none";
document.getElementById("status").innerText="Done";
document.getElementById("matched").innerText=count;

/* SHOW ACTION BUTTONS */
document.getElementById("resultButtons").style.display="flex";

window.fileName = name + ".txt";

}

/* DOWNLOAD */
function downloadFile(){

let blob = new Blob([mergedContent], {type:"text/plain"});
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = window.fileName;

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(a.href);

}

/* VIEW */
function viewFile(){

let w = window.open();
w.document.write("<pre style='white-space:pre-wrap;font-family:monospace;padding:20px'>" + mergedContent + "</pre>");

}

/* CLEAR */
function clearAll(){

files=[];
mergedContent="";

document.getElementById("folderName").value="";
document.getElementById("outputFile").value="";
document.getElementById("log").value="";

document.getElementById("total").innerText="0";
document.getElementById("matched").innerText="0";
document.getElementById("status").innerText="Idle";

document.getElementById("resultButtons").style.display="none";
document.getElementById("loader").style.display="none";

}

</script>

</body>
</html>
